name: Scan MEGA Folder
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'MEGA Folder or File URL'
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mega.py
        run: pip install async-mega.py

      - name: Scan MEGA folder
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python backend.py --scan-only \
            --url "${{ inputs.url }}" \
            --output "scan_cache/result_${{ github.run_id }}.json"

      - name: Push scan result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p scan_cache
          git add scan_cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "scan result ${{ github.run_id }} [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
